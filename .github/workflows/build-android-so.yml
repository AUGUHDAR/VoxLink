name: Build Android WebRTC Native Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Use GitLab mirrors (China-friendly)
        run: |
          git config --global url."https://gitlab.com/webrtc-mirror/webrtc.git".insteadOf "https://chromium.googlesource.com/external/webrtc.git"

      - name: Fetch WebRTC source
        run: |
          mkdir -p ~/webrtc
          cd ~/webrtc
          fetch --nohooks webrtc_android
          gclient sync -D --no-history

      - name: Build WebRTC for Android arm64
        run: |
          cd ~/webrtc/src
          gn gen out/android-arm64 --args='
            target_os="android"
            target_cpu="arm64"
            is_debug=false
            is_component_build=false
            rtc_include_tests=false
            rtc_build_examples=false
            use_custom_libcxx=false
            treat_warnings_as_errors=false
          '
          ninja -C out/android-arm64 webrtc

      - name: Checkout webrtc-java
        run: |
          git clone https://gitcode.com/gh_mirrors/we/webrtc-java.git /tmp/webrtc-java
          cd /tmp/webrtc-java
          git checkout v0.14.0 || git checkout master

      - name: Build webrtc-java JNI for Android
        run: |
          mkdir /tmp/webrtc-java-build && cd /tmp/webrtc-java-build
          cmake /tmp/webrtc-java/webrtc-jni \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DWEBRTC_INSTALL_DIR=$HOME/webrtc/src/out/android-arm64/obj \
            -DJAVA_HOME=$JAVA_HOME
          cmake --build . -j$(nproc)

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-java-android
          path: /tmp/webrtc-java-build/libwebrtc-java.so
